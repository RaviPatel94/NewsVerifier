<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navigation">
        <div class="brand">
            <img src="images/news detect logo.png" alt="" width="30px" height="30px">
            <div class="brandtext">NewsVerifier</div>
        </div>
        <div class="navoptions">
            <div class="option"><a href="#hero">Home</a></div>
            <div class="option">Add</div>
            <div class="option"> <a href="">Contact us</a> </div>
        </div>
    </nav>
    <main>
        <section id="hero" class="hero">
            <div class="herotext">Real or fake? Verify it now!</div>
            <div><input type="" placeholder="Paste the news heading here"></div>
            <div>
                <button>Verify</button>
                <button>Add Extension</button>
            </div>
            <div class="result">
                <div class="value">False</div>
                <div class="reason">Coudnt find any source backing this </div>
            </div>
        </section>
    </main>
</body>
</html>
